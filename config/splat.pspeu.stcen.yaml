options:
  platform: psp
  basename: stcen
  base_path: ..
  build_path: build/pspeu
  target_path: disks/pspeu/PSP_GAME/USRDIR/res/ps/PSPBIN/cen.bin
  asm_path: asm/pspeu/st/cen_psp
  asset_path: assets/st/cen
  src_path: src/st
  ld_script_path: build/pspeu/stcen.ld
  compiler: GCC
  symbol_addrs_path:
    - config/symbols.pspeu.txt
    - config/symbols.pspeu.stcen.txt
  undefined_funcs_auto_path: build/pspeu/config/undefined_funcs_auto.pspeu.stcen.txt
  undefined_syms_auto_path: build/pspeu/config/undefined_syms_auto.pspeu.stcen.txt
  find_file_boundaries: true
  use_legacy_include_asm: false
  migrate_rodata_to_functions: true
  asm_jtbl_label_macro: jlabel
  symbol_name_format: pspeu_$VRAM
  disassemble_all: true
  section_order:
    - .text
    - .data
    - .rodata
    - .bss
  ld_bss_is_noload: true
  disasm_unknown: true
  global_vram_start: 0x08000000
  ld_generate_symbol_per_data_segment: true
  asm_inc_header: |
    .set noat      /* allow manual use of $at */
    .set noreorder /* don't insert nops after branches */
sha1: 5e2584e90e876ac2c35c6e5a18e5760015b13fcb
