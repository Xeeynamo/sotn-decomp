options:
  platform:     psx
  basename:     strwrp
  base_path:    ..
  build_path:   build/us
  target_path:  disks/us/ST/RWRP/RWRP.BIN
  asm_path:     asm/us/st/rwrp
  asset_path:   assets/st/rwrp
  src_path:     src/st/rwrp
  ld_script_path: build/us/strwrp.ld
  compiler:     GCC
  symbol_addrs_path:
    - config/symbols.us.txt
    - config/symbols.us.strwrp.txt
  undefined_funcs_auto_path: build/us/config/undefined_funcs_auto.us.strwrp.txt
  undefined_syms_auto_path:  build/us/config/undefined_syms_auto.us.strwrp.txt
  find_file_boundaries: yes
  use_legacy_include_asm: no
  migrate_rodata_to_functions: no
  asm_jtbl_label_macro: jlabel
  extensions_path: tools/splat_ext
  disassemble_all: true
  global_vram_start: 0x80010000
  section_order:
    - ".data"
    - ".rodata"
    - ".text"
    - ".bss"
    - ".sbss"
  ld_generate_symbol_per_data_segment: true
sha1: 3bbdd3b73f8f86cf5f6c88652e9e6452a7fb5992
segments:
  - name: strwrp
    type: code
    start: 0x00000000
    vram:  0x80180000
    align: 4
    subalign: 4
    subsegments:
      - [0x0, .data, header]
      - [0x40, .data, sprite_banks]
      - [0xA0, .data, palette_def]
      - [0xB8, .data, layers]
      - [0x1B8, .data, graphics_banks]
      - [0x23C, .data, gen/e_laydef] # layout entries header
      - [0x3E4, .data, e_init]
      - [0x4D0, .data, background_block_init]
      - [0x508, .data, e_red_door_tiles]
      - [0x528, .data, e_lock_camera]
      - [0x5A8, .data, e_breakable]
      - [0x608, .data, d_prize_drops]
      - [0x648, .data, warp]
      - [0x690, .data, st_update]
      - [0x6BC, .data, collision]
      - [0xA7C, .data, e_red_door]
      - [0xA94, .data, st_common]
      - [0xC94, .data, e_collect]
      - [0xF84, .data, e_misc]
      - [0xFE8, .data, e_particles]
      - [0x1120, .data, e_room_fg]
      - [0x11AC, .data, gen/rooms]
      - [0x1228, .data, gen/e_layout] # layout entries data
      - [0x1420, .data, stage_data]
      - [0x6FE8, .data, gen/sprites]
      - [0x8C48, .rodata, warp] # warp strings
      - [0x8C88, .rodata, warp] # EntityRWarpRoom
      - [0x8CB0, .rodata, warp] # EntityWarpSmallRocks
      - [0x8CC8, .rodata, e_red_door] # EntityRedDoor
      - [0x8CE0, .rodata, e_collect] # CollectGold strings
      - [0x8D30, .rodata, e_collect] # EntityPrizeDrop
      - [0x8D50, .rodata, e_collect] # EntityEquipItemDrop
      - [0x8D68, .rodata, e_misc] # EntityRelicOrb
      - [0x8DA0, .rodata, e_misc] # EntityMessageBox
      - [0x8DB4, .rodata, e_stage_name] # EntityStageNamePopup
      - [0x8DE8, .rodata, prim_helpers]
      - [0x8DF0, c, e_room_bg]
      - [0x8ED0, c, e_lock_camera]
      - [0x908C, c, e_breakable]
      - [0x91C0, c, warp]
      - [0xA168, c, st_update]
      - [0xA59C, c, collision]
      - [0xBD58, c, create_entity]
      - [0xC8D0, c, e_red_door]
      - [0xD580, c, st_common]
      - [0xEA30, c, e_collect]
      - [0x1024C, c, e_misc]
      - [0x1373C, c, e_stage_name]
      - [0x14590, c, e_particles]
      - [0x14DD4, c, e_room_fg]
      - [0x14EC0, c, popup]
      - [0x151F0, c, prim_helpers]
