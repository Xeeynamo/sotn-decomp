options:
  platform: psp
  basename: strwrp
  base_path: ..
  build_path: build/pspeu
  target_path: disks/pspeu/PSP_GAME/USRDIR/res/ps/PSPBIN/rwrp.bin
  asm_path: asm/pspeu/st/rwrp_psp
  asset_path: assets/st/rwrp
  src_path: src/st/rwrp
  ld_script_path: build/pspeu/strwrp.ld
  compiler: GCC
  symbol_addrs_path:
